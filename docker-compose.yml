services:
  sustainova-backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    env_file:
      - ./.env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - redis

  sustainova-frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      - sustainova-backend

  redis:
    image: redis:7-alpine
